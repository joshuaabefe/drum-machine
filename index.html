<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatByJosh — Drum Machine</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png"   href="favicon.png" sizes="32x32" />
  <link rel="apple-touch-icon"        href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-bg">

    <!-- ══════════════════════════════════════
         MACHINE CARD
    ══════════════════════════════════════ -->
    <div class="machine-card" id="drum-machine">

      <!-- ── TOP BAR: title + clock + theme + power ── -->
      <header class="top-bar">
        <div class="brand">
          <span class="brand-icon">◈</span>
          <span class="brand-name">BEAT<em>BOX</em> 909</span>
        </div>

        <!-- Live date + time display -->
        <div class="clock-box">
          <span class="clock-time" id="clock-time">00:00:00</span>
          <span class="clock-date" id="clock-date">MON 01 JAN 2026</span>
        </div>

        <!-- Controls: theme toggle + power -->
        <div class="top-controls">
          <!-- Dark / Light mode toggle -->
          <button class="theme-btn" id="theme-toggle" title="Toggle dark / light mode" aria-label="Toggle theme">
            <span class="theme-icon" id="theme-icon">☀️</span>
          </button>

          <!-- Power toggle -->
          <label class="power-toggle" title="Power On / Off">
            <input type="checkbox" id="power-switch" checked />
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
            <span class="toggle-label">PWR</span>
          </label>
        </div>
      </header>

      <!-- ── DISPLAY SCREEN + VOLUME ── -->
      <div class="display-panel">
        <div class="display-screen">
          <div class="screen-label">NOW PLAYING</div>
          <div class="screen-text" id="display-text">— READY —</div>
        </div>

        <div class="volume-control">
          <label class="vol-label" for="volume-slider">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            VOL
          </label>
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8" />
          <span class="vol-value" id="vol-display">80%</span>
        </div>
      </div>

      <!-- ── DRUM PADS 3×3 GRID ── -->
      <!--
        No audio files needed!
        All sounds are synthesized live via Web Audio API in script.js.
        data-sound tells the JS which synthesis function to call.
      -->
      <div class="pads-grid" id="pads-grid">

        <button class="drum-pad" data-key="Q" data-name="KICK"     data-sound="kick">
          <span class="key-label">Q</span>
          <span class="sound-name">KICK</span>
          <div class="pad-ripple"></div>
        </button>

        <button class="drum-pad" data-key="W" data-name="SNARE"    data-sound="snare">
          <span class="key-label">W</span>
          <span class="sound-name">SNARE</span>
          <div class="pad-ripple"></div>
        </button>

        <button class="drum-pad" data-key="E" data-name="HI-HAT"   data-sound="hihat">
          <span class="key-label">E</span>
          <span class="sound-name">HI-HAT</span>
          <div class="pad-ripple"></div>
        </button>

        <button class="drum-pad" data-key="A" data-name="CLAP"     data-sound="clap">
          <span class="key-label">A</span>
          <span class="sound-name">CLAP</span>
          <div class="pad-ripple"></div>
        </button>

        <button class="drum-pad" data-key="S" data-name="TOM"      data-sound="tom">
          <span class="key-label">S</span>
          <span class="sound-name">TOM</span>
          <div class="pad-ripple"></div>
        </button>

        <button class="drum-pad" data-key="D" data-name="OPEN HAT" data-sound="openhat">
          <span class="key-label">D</span>
          <span class="sound-name">OPEN HAT</span>
          <div class="pad-ripple"></div>
        </button>

        <button class="drum-pad" data-key="Z" data-name="RIM"      data-sound="rim">
          <span class="key-label">Z</span>
          <span class="sound-name">RIM</span>
          <div class="pad-ripple"></div>
        </button>

        <button class="drum-pad" data-key="X" data-name="CRASH"    data-sound="crash">
          <span class="key-label">X</span>
          <span class="sound-name">CRASH</span>
          <div class="pad-ripple"></div>
        </button>

        <button class="drum-pad" data-key="C" data-name="PERC"     data-sound="perc">
          <span class="key-label">C</span>
          <span class="sound-name">PERC</span>
          <div class="pad-ripple"></div>
        </button>

      </div><!-- /.pads-grid -->

      <!-- ── KEYBOARD HINT ── -->
      <div class="hint-bar">
        🎹 Press <strong>Q W E / A S D / Z X C</strong> or click a pad
      </div>

    </div><!-- /.machine-card -->

    <!-- ══════════════════════════════════════
         FOOTER
    ══════════════════════════════════════ -->
    <footer class="site-footer">
      <span>Copyright &copy; 2026. All Rights Reserved.</span>
      <span class="footer-dot">·</span>
      <span>
        Developed by
        <a href="https://joshuaabefe.github.io/" target="_blank" rel="noopener">
          Joshua Abefe
        </a>
      </span>
    </footer>

  </div><!-- /.page-bg -->

  <script src="script.js"></script>
</body>
</html>
